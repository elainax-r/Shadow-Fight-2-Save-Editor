<!DOCTYPE html>
<html lang="en">
<head>

    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Shadow Fight 2 File Editor</title>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            background: #1a1108;
            font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
            padding: 20px;
            color: #d4c5a0;
        }

        .xml-validator-container {
            max-width: 1000px;
            margin: 0 auto;
            padding: 20px;
            background: linear-gradient(145deg, rgba(42, 26, 10, 0.6), rgba(74, 46, 18, 0.3));
            border-radius: 24px;
            border: 1px solid rgba(255, 215, 0, 0.08);
            box-shadow: 0 8px 40px rgba(0, 0, 0, 0.3);
        }

        .tools-header {
            text-align: center;
            margin-bottom: 28px;
            padding-bottom: 20px;
            border-bottom: 2px solid rgba(255, 215, 0, 0.1);
        }

            .tools-header h2 {
                font-size: 28px;
                font-weight: 700;
                background: linear-gradient(135deg, #ffd700, #ff8c00);
                -webkit-background-clip: text;
                -webkit-text-fill-color: transparent;
                margin-bottom: 4px;
            }

        .upload-section {
            display: flex;
            flex-wrap: wrap;
            gap: 10px;
            margin-bottom: 20px;
        }

        .btn {
            display: inline-flex;
            align-items: center;
            gap: 6px;
            padding: 8px 18px;
            border: none;
            border-radius: 8px;
            font-weight: 600;
            font-size: 13px;
            cursor: pointer;
            transition: all 0.2s ease;
            background: rgba(255, 255, 255, 0.05);
            color: #b8955a;
        }

        .btn-download-editor {
            background: linear-gradient(135deg, rgba(255, 215, 0, 0.12), rgba(255, 140, 0, 0.06));
            color: #ffd700;
            border: 1px solid rgba(255, 215, 0, 0.1);
        }

            .btn-download-editor:hover:not(:disabled) {
                background: linear-gradient(135deg, rgba(255, 215, 0, 0.2), rgba(255, 140, 0, 0.1));
                transform: translateY(-2px);
                box-shadow: 0 4px 20px rgba(255, 215, 0, 0.1);
            }

        .btn-reset-editor {
            background: rgba(255, 69, 0, 0.06);
            color: #ff6b35;
            border: 1px solid rgba(255, 69, 0, 0.06);
        }

            .btn-reset-editor:hover:not(:disabled) {
                background: rgba(255, 69, 0, 0.12);
                transform: translateY(-2px);
            }

        .btn:disabled {
            opacity: 0.3;
            cursor: not-allowed;
            transform: none !important;
        }

        .btn-icon {
            font-size: 18px;
        }

        .quick-actions-menu {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(170px, 1fr));
            gap: 10px;
            margin-bottom: 20px;
            padding: 16px;
            background: linear-gradient(145deg, rgba(42, 26, 10, 0.6), rgba(74, 46, 18, 0.3));
            border-radius: 14px;
            border: 1px solid rgba(255, 215, 0, 0.06);
        }

        .menu-item {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            padding: 12px 10px;
            background: linear-gradient(145deg, rgba(42, 26, 10, 0.8), rgba(74, 46, 18, 0.6));
            border: 2px solid rgba(255, 215, 0, 0.06);
            border-radius: 12px;
            color: #d4a85a;
            cursor: pointer;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            font-size: 13px;
            font-weight: 600;
            min-height: 48px;
        }

            .menu-item:hover:not(:disabled) {
                transform: translateY(-2px) scale(1.02);
                border-color: rgba(255, 215, 0, 0.2);
                box-shadow: 0 8px 30px rgba(255, 215, 0, 0.1);
                background: linear-gradient(145deg, rgba(255, 215, 0, 0.12), rgba(74, 46, 18, 0.8));
                color: #ffd700;
            }

            .menu-item:disabled {
                opacity: 0.3;
                cursor: not-allowed;
                transform: none !important;
            }

        .menu-icon {
            font-size: 20px;
            flex-shrink: 0;
        }

        .menu-title {
            flex: 1;
            text-align: center;
            font-size: 13px;
        }

        .menu-badge {
            font-size: 12px;
            opacity: 0.3;
        }

        .file-info-card {
            display: flex;
            align-items: center;
            gap: 14px;
            padding: 12px 18px;
            background: linear-gradient(145deg, rgba(42, 26, 10, 0.8), rgba(74, 46, 18, 0.6));
            border-radius: 14px;
            border: 1px solid rgba(255, 215, 0, 0.08);
            margin-bottom: 16px;
        }

        .file-info-icon {
            font-size: 24px;
        }

        .file-info-content {
            flex: 1;
        }

        .file-name {
            font-size: 14px;
            font-weight: 600;
            color: #d4a85a;
        }

        .file-details {
            font-size: 12px;
            color: #8a6a3a;
        }

        .file-status-badge {
            padding: 3px 14px;
            border-radius: 20px;
            font-size: 11px;
            font-weight: 600;
            background: rgba(76, 175, 80, 0.15);
            color: #4caf50;
            border: 1px solid rgba(76, 175, 80, 0.1);
        }

        .result-card {
            display: flex;
            align-items: center;
            gap: 14px;
            padding: 14px 18px;
            border-radius: 14px;
            margin-bottom: 16px;
        }

            .result-card.success {
                background: rgba(76, 175, 80, 0.08);
                border: 1px solid rgba(76, 175, 80, 0.15);
            }

            .result-card.error {
                background: rgba(255, 69, 0, 0.08);
                border: 1px solid rgba(255, 69, 0, 0.15);
            }

        .result-icon {
            font-size: 24px;
            flex-shrink: 0;
        }

        .result-content {
            flex: 1;
        }

        .result-title {
            font-size: 15px;
            font-weight: 600;
            color: #d4a85a;
        }

        .result-message {
            font-size: 13px;
            color: #b8955a;
        }

        .close {
            background: none;
            border: none;
            color: inherit;
            font-size: 18px;
            cursor: pointer;
            opacity: 0.5;
            padding: 4px;
        }

            .close:hover {
                opacity: 1;
            }

        .error-table-container {
            background: linear-gradient(145deg, rgba(42, 26, 10, 0.8), rgba(74, 46, 18, 0.6));
            border-radius: 14px;
            border: 1px solid rgba(255, 215, 0, 0.06);
            overflow: hidden;
            margin-bottom: 20px;
        }

        .table-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 14px 18px;
            border-bottom: 1px solid rgba(255, 215, 0, 0.06);
        }

            .table-header h3 {
                font-size: 15px;
                color: #d4a85a;
                font-weight: 600;
            }

        .error-count {

            padding: 3px 12px;
            background: rgba(255, 69, 0, 0.1);
            border-radius: 20px;
            color: #ff6b35;
            border: 1px solid rgba(255, 69, 0, 0.1);
        }

        .error-table {
            width: 100%;
            border-collapse: collapse;
        }

                background: rgba(0, 0, 0, 0.2);
            }

            .error-table th {
                padding: 10px 14px;
                text-align: left;
                font-size: 11px;
                font-weight: 700;
                text-transform: uppercase;
                color: #8a6a3a;
                border-bottom: 1px solid rgba(255, 215, 0, 0.06);
            }

            .error-table td {
                padding: 10px 14px;
                font-size: 12px;
                color: #d4c5a0;
                border-bottom: 1px solid rgba(255, 215, 0, 0.03);
            }

        .badge-line {
            display: inline-block;
            padding: 2px 8px;
            background: rgba(255, 215, 0, 0.06);
            border-radius: 5px;
            font-weight: 600;
            color: #d4a85a;
            font-size: 11px;
        }

        .badge-col {
            display: inline-block;
            padding: 2px 8px;
            background: rgba(255, 215, 0, 0.04);
            border-radius: 5px;
            color: #b8955a;
            font-size: 11px;
        }

        .status-badge {
            padding: 2px 10px;
            border-radius: 12px;
            font-size: 10px;
            font-weight: 600;
            background: rgba(255, 69, 0, 0.1);
            color: #ff6b35;
            border: 1px solid rgba(255, 69, 0, 0.1);
        }

        .editor-section {
            background: linear-gradient(145deg, rgba(42, 26, 10, 0.8), rgba(74, 46, 18, 0.6));
            border-radius: 14px;
            border: 1px solid rgba(255, 215, 0, 0.06);
            overflow: hidden;
            margin-top: 16px;
        }

        .editor-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 14px 18px;
            border-bottom: 1px solid rgba(255, 215, 0, 0.06);
            flex-wrap: wrap;
            gap: 10px;
        }

        .editor-title-group {
            display: flex;
            align-items: center;
            gap: 10px;
        }

            .editor-title-group h2 {
                font-size: 15px;
                font-weight: 600;
                color: #d4a85a;
                margin: 0;
            }

        .editor-tag {
            font-size: 10px;
            padding: 3px 10px;
            background: rgba(255, 215, 0, 0.06);
            border-radius: 20px;
            color: #8a6a3a;
            border: 1px solid rgba(255, 215, 0, 0.06);
        }

        .editor-wrapper {
            position: relative;
            padding: 12px 16px;
        }

        .editor-container {
            display: flex;
            background: rgba(0, 0, 0, 0.3);
            border-radius: 10px;
            overflow: hidden;
            border: 1px solid rgba(255, 215, 0, 0.06);
            height: 450px;
            max-height: 450px;
            min-height: 450px;
        }

        .editor-gutter {
            flex-shrink: 0;
            width: 44px;
            background: rgba(0, 0, 0, 0.2);
            padding: 8px 0;
            overflow: hidden;
            user-select: none;
            border-right: 1px solid rgba(255, 215, 0, 0.04);
            height: 100%;
        }

        .gutter-line {
            display: flex;
            align-items: center;
            height: 20px;
            padding: 0 6px;
            gap: 4px;
        }

            .gutter-line.gutter-error {
                background: rgba(255, 69, 0, 0.08);
                border-left: 3px solid #ff6b35;
            }

        .line-number {
            font-size: 11px;
            font-family: 'Consolas', 'Monaco', monospace;
            color: #5a4a3a;
            min-width: 24px;
            text-align: right;
        }

        .gutter-line.gutter-error .line-number {
            color: #ff6b35;
            font-weight: 600;
        }

        .line-marker {
            flex: 1;
            height: 1px;
            background: rgba(255, 215, 0, 0.03);
        }

        .editor-textarea {
            flex: 1;
            padding: 8px 14px;
            background: transparent;
            border: none;
            color: #d4c5a0;
            font-family: 'Consolas', 'Monaco', monospace;
            font-size: 12px;
            line-height: 20px;
            resize: none;
            outline: none;
            height: 100%;
            min-height: 100%;
            tab-size: 2;
            overflow: auto;
            white-space: pre !important;
            overflow-x: auto !important;
            overflow-y: auto !important;
            word-wrap: normal !important;
            word-break: normal !important;
        }

            .editor-textarea:focus {
                background: rgba(255, 215, 0, 0.02);
            }

            .editor-textarea::-webkit-scrollbar {
                width: 8px;
                height: 8px;
            }

            .editor-textarea::-webkit-scrollbar-track {
                background: rgba(0, 0, 0, 0.2);
                border-radius: 4px;
            }

            .editor-textarea::-webkit-scrollbar-thumb {
                background: rgba(255, 215, 0, 0.15);
                border-radius: 4px;
            }

        .editor-footer {
            display: flex;
            gap: 16px;
            padding: 8px 14px 0;
            border-top: 1px solid rgba(255, 215, 0, 0.04);
            margin-top: 6px;
        }

        .editor-stats {
            font-size: 11px;
            color: #5a4a3a;
            font-family: monospace;
        }

        .editor-status-dirty {
            font-size: 11px;
            color: #ffd700;
            font-weight: 600;
            animation: pulseDirty 2s ease-in-out infinite;
        }

        @keyframes pulseDirty {
            0%, 100% {
                opacity: 0.7;
            }

            50% {
                opacity: 1;
            }
        }

        @media (max-width: 768px) {
            .quick-actions-menu {
                grid-template-columns: repeat(auto-fill, minmax(140px, 1fr));
            }

            .editor-container {
                height: 350px;
                max-height: 350px;
                min-height: 350px;
            }

            .editor-gutter {
                width: 36px;
            }

            .editor-textarea {
                font-size: 11px;
            }
        }

        @media (max-width: 480px) {
            .quick-actions-menu {
                grid-template-columns: 1fr 1fr;
            }

            .editor-container {
                height: 280px;
                max-height: 280px;
                min-height: 280px;
            }

            .editor-gutter {
                width: 30px;
            }

            .line-number {
                font-size: 9px;
                min-width: 18px;
            }

            .editor-textarea {
                font-size: 10px;
            }
        }
    </style>
</head>

            function splitLines(text) {
                const norm = text.replace(/\r\n/g, '\n').replace(/\r/g, '\n');
                return norm.split('\n');
            }

            function updateStats() {
                const lines = splitLines(content);
                lineCount = lines.length;
                lineStats.textContent = `Lines: ${lineCount}`;
                charStats.textContent = `Characters: ${content.length}`;
                fileDetails.textContent = `${fileSizeBytes} bytes · ${lineCount} lines`;
                if (fileName) {
                    fileNameDisplay.textContent = fileName;
                    fileInfo.style.display = 'flex';
                }
                dirtyIndicator.style.display = isDirty ? 'inline' : 'none';
                downloadBtn.disabled = !fileName || !isValid;
                resetBtn.disabled = !fileName || !isValid;
                renderGutter(lines);
                actions.forEach(btn => {
                    btn.disabled = !fileName || !isValid;
                });
            }

            function renderGutter(lines) {
                let html = '';
                for (let i = 0; i < lines.length; i++) {
                    const lineNum = i + 1;
                    const hasErr = errorLineNumbers.has(lineNum);
                    html += `<div class="gutter-line ${hasErr ? 'gutter-error' : ''}">
                        <span class="line-number">${lineNum}</span>
                        <span class="line-marker"></span>
                    </div>`;
                }
                gutter.innerHTML = html;
                gutter.scrollTop = editorTextarea.scrollTop;
            }

            function validateXml(text) {
                errors = [];
                errorLineNumbers.clear();
                try {
                    const parser = new DOMParser();
                    const doc = parser.parseFromString(text, 'text/xml');
                    const parseError = doc.querySelector('parsererror');
                    if (parseError) {
                        const msg = parseError.textContent || 'Invalid XML';
                        errors.push({ line: 0, column: 0, message: msg });
                        errorLineNumbers.add(1);
                        isValid = false;
                    } else {
                        isValid = true;
                    }
                } catch (e) {
                    errors.push({ line: 0, column: 0, message: e.message });
                    errorLineNumbers.add(1);
                    isValid = false;
                }
                return isValid;
            }

            function showResult(type, title, message, errorsList) {
                let html = '';
                if (type === 'success') {
                    html = `<div class="result-card success">
                        <div class="result-icon">✅</div>
                        <div class="result-content">
                            <span class="result-title">${title}</span>
                            <span class="result-message">${message}</span>
                        </div>
                        <button class="close" onclick="this.parentElement.remove()">✕</button>
                    </div>`;
                } else if (type === 'error') {
                    html = `<div class="result-card error">
                        <div class="result-icon">⚠️</div>
                        <div class="result-content">
                            <span class="result-title">${title}</span>
                            <span class="result-message">${message}</span>
                        </div>
                        <button class="close" onclick="this.parentElement.remove()">✕</button>
                    </div>`;
                    if (errorsList && errorsList.length) {
                        html += `<div class="error-table-container">
                            <div class="table-header"><h3>❌ Error Details</h3><span class="error-count">${errorsList.length} errors</span></div>
                            <table class="error-table"><thead><tr><th>Line</th><th>Col</th><th>Message</th><th>Status</th></tr></thead><tbody>`;
                        errorsList.forEach(e => {
                            html += `<tr><td><span class="badge-line">${e.line || 0}</span></td><td><span class="badge-col">${e.column || 0}</span></td><td>${e.message}</td><td><span class="status-badge">⚠ Error</span></td></tr>`;
                        });
                        html += `</tbody></table></div>`;
                    }
                } else if (type === 'action') {
                    html = `<div class="result-card success">
                        <div class="result-icon">✅</div>
                        <div class="result-content">
                            <span class="result-title">${title}</span>
                            <span class="result-message">${message}</span>
                        </div>
                        <button class="close" onclick="this.parentElement.remove()">✕</button>
                    </div>`;
                }
                resultArea.innerHTML = html;
            }

            function applyEdits(newContent, successTitle, successMessage) {
                content = newContent;
                originalContent = content;
                isDirty = false;
                fileSizeBytes = new Blob([content]).size;
                validateXml(content);
                updateStats();
                editorTextarea.value = content;
                if (isValid) {
                    showResult('action', successTitle, successMessage);
                } else {
                    showResult('error', 'Validation Error', 'The edited XML is invalid.', errors);
                }
                syncGutterScroll();
            }

            function createElement(doc, tag, attrs) {
                const el = doc.createElement(tag);
                for (const [key, value] of Object.entries(attrs)) {
                    el.setAttribute(key, value);
                }
                return el;
            }

            function addEnchantments(doc, itemElement, itemName) {
                const existingEnch = itemElement.querySelector('Enchantments');
                if (existingEnch) {
                    itemElement.removeChild(existingEnch);
                }

                const enchNode = doc.createElement('Enchantments');

                switch (itemName) {
                    case 'HELM_CONICAL_HAT':
                        addPerk(doc, enchNode, 'PERK_ITEM_SPECIAL_DAMAGE_ABSORPTION_HEAD_HELM', '2000');
                        addPerk(doc, enchNode, 'PERK_TIME_SHIFT_SET_TIME_SHIFTER');
                        break;
                    case 'RANGED_CIRCULAR_SAW':
                        addPerk(doc, enchNode, 'PERK_ITEM_SPECIAL_FRENZY_RANGED', '2000');
                        addPerk(doc, enchNode, 'PERK_TIME_SHIFT_SET_TIME_SHIFTER');
                        break;
                    case 'WEAPON_POWER_FISTS':
                        addPerk(doc, enchNode, 'PERK_ITEM_SPECIAL_FRENZY_WEAPON', '2000');
                        addPerk(doc, enchNode, 'PERK_TIME_SHIFT_SET_TIME_SHIFTER');
                        break;
                    case 'ARMOR_XENOMORPH':
                        addPerk(doc, enchNode, 'PERK_ITEM_SPECIAL_DAMAGE_ABSORPTION_BODY_ARMOR', '2000');
                        addPerk(doc, enchNode, 'PERK_TIME_SHIFT_SET_TIME_SHIFTER');
                        break;
                    case 'MAGIC_SAWMILL':
                        addPerkWithChance(doc, enchNode, 'PERK_ITEM_SPECIAL_FRENZY_MAGIC', '2000', '1');
                        addPerk(doc, enchNode, 'PERK_TIME_SHIFT_SET_TIME_SHIFTER');
                        break;
                    default:
                        if (itemName.includes('TIME_SHIFTER')) {
                            addPerk(doc, enchNode, 'PERK_TIME_SHIFT_SET_TIME_SHIFTER');
                        }
                        break;
                }

                itemElement.appendChild(enchNode);
            }

            function addPerk(doc, parent, perkName, aspect) {
                const perk = doc.createElement('Perk');
                perk.setAttribute('Name', perkName);
                if (aspect) {
                    const setEl = doc.createElement('Set');
                    setEl.setAttribute('Aspect', aspect);
                    perk.appendChild(setEl);
                }
                parent.appendChild(perk);
            }

            function addPerkWithChance(doc, parent, perkName, aspect, chance) {
                const perk = doc.createElement('Perk');
                perk.setAttribute('Name', perkName);
                const setEl = doc.createElement('Set');
                setEl.setAttribute('Aspect', aspect);
                setEl.setAttribute('Chance', chance);
                perk.appendChild(setEl);
                parent.appendChild(perk);
            }

                    switch (action) {
                        case 'maxLevel': {
                            const warrior = xmlDoc.querySelector('Warrior[ID="1"]');
                            if (warrior) {
                                warrior.setAttribute('Level', '52');
                                warrior.setAttribute('Experience', '88000000');
                                modified = true;
                                title = '⬆️ Max Level Unlocked!';
                                msg = 'Level set to max!';
                            }
                            break;
                        }
                        case 'maxRuby': {
                            const warrior = xmlDoc.querySelector('Warrior[ID="1"]');
                            if (warrior) {
                                warrior.setAttribute('Bonus', '99999999');
                                modified = true;
                                title = '💎 Max Ruby Unlocked!';
                                msg = 'Ruby has been added!';
                            }
                            break;
                        }
                        case 'maxMoney': {
                            const warrior = xmlDoc.querySelector('Warrior[ID="1"]');
                            if (warrior) {
                                warrior.setAttribute('Money', '9999999999999');
                                modified = true;
                                title = '💰 Max Money Unlocked!';
                                msg = 'Money has been added!';
                            }
                            break;
                        }
                        case 'unlimitedEnergy': {
                            let items = xmlDoc.querySelector('Items');
                            if (!items) {
                                items = xmlDoc.createElement('Items');
                                xmlDoc.documentElement.appendChild(items);
                            }
                            let item = items.querySelector('Item[Name="Unlimited_Energy"]');
                            if (!item) {
                                item = createElement(xmlDoc, 'Item', {
                                    'Name': 'Unlimited_Energy',
                                    'Equipped': '1',
                                    'Count': '1',
                                    'UpgradeLevel': '0',
                                    'DeliveryTime': '0',
                                    'DeliveryUpgradeLevel': '-1',
                                    'AcquireType': 'Item'
                                });
                                items.appendChild(item);
                            } else {
                                item.setAttribute('Equipped', '1');
                                item.setAttribute('Count', '1');
                            }
                            modified = true;
                            title = '⚡ Unlimited Energy Unlocked!';
                            msg = 'Unlimited Energy has been successfully added!';
                            break;
                        }
                        case 'unlockForge': {
                            const currencies = xmlDoc.querySelector('Currencies');
                            if (currencies) {
                                currencies.setAttribute('ForgeMaterial1', '99999999');
                                currencies.setAttribute('ForgeMaterial2', '99999999');
                                currencies.setAttribute('ForgeMaterial3', '99999999');
                                modified = true;
                                title = '🟢 Forge Materials Unlocked!';
                                msg = 'All forge materials have been added!';
                            }
                            break;
                        }
                        case 'unlockGear': {
                            let items = xmlDoc.querySelector('Items');
                            if (!items) {
                                items = xmlDoc.createElement('Items');
                                xmlDoc.documentElement.appendChild(items);
                            }
                            const gearList = [
                                { name: 'WEAPON_BP_S5_TIME_SHIFTER', equipped: false, upgradeLevel: 5240 },
                                { name: 'HELM_BP_S5_TIME_SHIFTER', equipped: false, upgradeLevel: 5240 },
                                { name: 'ARMOR_BP_S5_TIME_SHIFTER', equipped: false, upgradeLevel: 5240 },
                                { name: 'RANGED_BP_S5_TIME_SHIFTER', equipped: false, upgradeLevel: 5240 },
                                { name: 'MAGIC_BP_S5_TIME_SHIFTER', equipped: false, upgradeLevel: 5240 },
                                { name: 'HELM_CONICAL_HAT', equipped: true, upgradeLevel: 5240 },
                                { name: 'RANGED_CIRCULAR_SAW', equipped: true, upgradeLevel: 5240 },
                                { name: 'WEAPON_POWER_FISTS', equipped: true, upgradeLevel: 5240 },
                                { name: 'ARMOR_XENOMORPH', equipped: true, upgradeLevel: 5240 },
                                { name: 'MAGIC_SAWMILL', equipped: true, upgradeLevel: 5240 }
                            ];
                            gearList.forEach(gear => {
                                let el = items.querySelector(`Item[Name="${gear.name}"]`);
                                if (!el) {
                                    el = createElement(xmlDoc, 'Item', {
                                        'Name': gear.name,
                                        'Equipped': gear.equipped ? '1' : '0',
                                        'Count': '1',
                                        'UpgradeLevel': gear.upgradeLevel.toString(),
                                        'DeliveryTime': '-1',
                                        'DeliveryUpgradeLevel': '-1',
                                        'AcquireType': 'Upgrade'
                                    });
                                    addEnchantments(xmlDoc, el, gear.name);
                                    items.appendChild(el);
                                } else {
                                    el.setAttribute('Equipped', gear.equipped ? '1' : '0');
                                    el.setAttribute('UpgradeLevel', gear.upgradeLevel.toString());
                                    el.setAttribute('Count', '1');
                                    addEnchantments(xmlDoc, el, gear.name);
                                }
                            });
                            modified = true;
                            title = '🛡️ Gear Unlocked!';
                            msg = 'All gear items with enchantments have been successfully unlocked!';
                            break;
                        }
                        case 'completeStory': {
                            let battlesNode = xmlDoc.querySelector('Battles');
                            if (!battlesNode) {
                                battlesNode = xmlDoc.createElement('Battles');
                                xmlDoc.documentElement.appendChild(battlesNode);
                            }
                            allBattles.forEach(battle => {
                                const existing = battlesNode.querySelector(`Battle[Name="${battle.Name}"]`);
                                if (!existing) {
                                    const el = createElement(xmlDoc, 'Battle', {
                                        'Name': battle.Name,
                                        'Locked': battle.Locked,
                                        'Hidden': battle.Hidden,
                                        'ReplayCount': battle.ReplayCount
                                    });
                                    battlesNode.appendChild(el);
                                } else {
                                    existing.setAttribute('Locked', battle.Locked);
                                    existing.setAttribute('Hidden', battle.Hidden);
                                    existing.setAttribute('ReplayCount', battle.ReplayCount);
                                }
                            });

                            let fightsNode = xmlDoc.querySelector('Fights');
                            if (!fightsNode) {
                                fightsNode = xmlDoc.createElement('Fights');
                                xmlDoc.documentElement.appendChild(fightsNode);
                            }
                            allFights.forEach(fight => {
                                const existing = fightsNode.querySelector(`Fight[IDS="${fight.IDS}"]`);
                                if (!existing) {
                                    const el = createElement(xmlDoc, 'Fight', {
                                        'ID': '-1',
                                        'IDS': fight.IDS,
                                        'CompletedCount': fight.CompletedCount,
                                        'LossCount': fight.LossCount,
                                        'EclipseCompletedCount': fight.EclipseCompletedCount,
                                        'EclipseLossCount': fight.EclipseLossCount,
                                        'StoryCount': fight.StoryCount,
                                        'CompletedTime': fight.CompletedTime,
                                        'TimeLeft': fight.TimeLeft,
                                        'RandomizeTimeLeft': fight.RandomizeTimeLeft,
                                        'Level': fight.Level
                                    });
                                    fightsNode.appendChild(el);
                                }
                            });
                            bossFights.forEach(ids => {
                                const existing = fightsNode.querySelector(`Fight[IDS="${ids}"]`);
                                if (!existing) {
                                    const timeLeft = bossTimeLefts[ids] || '0';
                                    const el = createElement(xmlDoc, 'Fight', {
                                        'ID': '-1',
                                        'IDS': ids,
                                        'CompletedCount': '1',
                                        'LossCount': '0',
                                        'EclipseCompletedCount': '0',
                                        'EclipseLossCount': '0',
                                        'StoryCount': '0',
                                        'CompletedTime': '0',
                                        'TimeLeft': timeLeft,
                                        'RandomizeTimeLeft': '0',
                                        'Level': '52'
                                    });
                                    fightsNode.appendChild(el);
                                }
                            });

                            modified = true;
                            title = '📖 Story Completed!';
                            msg = 'All battles and fights have been successfully unlocked!';
                            break;
                        }
                        case 'maxPerk': {
                            let perkHistoryNode = xmlDoc.querySelector('PerkHistory');
                            if (!perkHistoryNode) {
                                perkHistoryNode = xmlDoc.createElement('PerkHistory');
                                xmlDoc.documentElement.appendChild(perkHistoryNode);
                            }
                            perkHistoryLevels.forEach(ph => {
                                const existing = perkHistoryNode.querySelector(`Level[Value="${ph.level}"]`);
                                if (!existing) {
                                    const el = createElement(xmlDoc, 'Level', {
                                        'Value': ph.level.toString(),
                                        'Perk': ph.perk
                                    });
                                    perkHistoryNode.appendChild(el);
                                } else {
                                    existing.setAttribute('Perk', ph.perk);
                                }
                            });

                            let perksNode = xmlDoc.querySelector('Perks');
                            if (!perksNode) {
                                perksNode = xmlDoc.createElement('Perks');
                                xmlDoc.documentElement.appendChild(perksNode);
                            }
                            perks.forEach(perk => {
                                const existing = perksNode.querySelector(`Perk[Name="${perk.name}"]`);
                                if (!existing) {
                                    const attrs = {
                                        'Level': perk.level.toString(),
                                        'Name': perk.name
                                    };
                                    if (perk.upgradeLevel !== null) {
                                        attrs['UpgradeLevel'] = perk.upgradeLevel.toString();
                                    }
                                    const el = createElement(xmlDoc, 'Perk', attrs);
                                    perksNode.appendChild(el);
                                } else {
                                    existing.setAttribute('Level', perk.level.toString());
                                    if (perk.upgradeLevel !== null) {
                                        existing.setAttribute('UpgradeLevel', perk.upgradeLevel.toString());
                                    }
                                }
                            });

                            modified = true;
                            title = '⭐ Max Perks Unlocked!';
                            msg = 'All perks have been set successfully!';
                            break;
                        }
                        default: return;
                    }

                    if (modified) {
                        const serializer = new XMLSerializer();
                        let newContent = serializer.serializeToString(xmlDoc);
                        newContent = newContent.replace(/></g, '>\n<');
                        applyEdits(newContent, title, msg);
                    } else {
                        showResult('error', 'Action Failed', 'Could not apply modification.');
                    }
                } catch (e) {
                    showResult('error', 'Error', e.message);
                }
            }

            function loadFile(file) {
                const reader = new FileReader();
                reader.onload = function (e) {
                    fileName = file.name;
                    fileSizeBytes = file.size;
                    content = e.target.result;
                    originalContent = content;
                    isDirty = false;
                    validateXml(content);
                    editorTextarea.value = content;
                    editorSection.style.display = 'block';
                    updateStats();
                    clearResults();
                    if (isValid) {
                        showResult('success', 'Valid XML', 'No errors found. Your XML is valid!');
                    } else {
                        showResult('error', 'Validation Failed', `${errors.length} error(s) found in your XML`, errors);
                    }
                    syncGutterScroll();
                    downloadBtn.disabled = false;
                    resetBtn.disabled = false;
                    actions.forEach(btn => btn.disabled = false);
                };
                reader.readAsText(file);
            }

            function syncGutterScroll() {
                gutter.scrollTop = editorTextarea.scrollTop;
            }

            uploadBtn.addEventListener('click', function () {
                fileInput.click();
            });

            fileInput.addEventListener('change', function (e) {
                if (this.files && this.files.length > 0) {
                    loadFile(this.files[0]);
                    this.value = '';
                }
            });

            downloadBtn.addEventListener('click', function () {
                if (!content) return;
                const blob = new Blob([content], { type: 'application/xml' });
                const url = URL.createObjectURL(blob);
                const a = document.createElement('a');
                a.href = url;
                a.download = fileName || 'users.xml';
                document.body.appendChild(a);
                a.click();
                document.body.removeChild(a);
                URL.revokeObjectURL(url);
            });

            resetBtn.addEventListener('click', function () {
                if (originalContent) {
                    content = originalContent;
                    isDirty = false;
                    validateXml(content);
                    editorTextarea.value = content;
                    updateStats();
                    clearResults();
                    if (isValid) {
                        showResult('success', 'Valid XML', 'No errors found. Your XML is valid!');
                    } else {
                        showResult('error', 'Validation Failed', `${errors.length} error(s) found in your XML`, errors);
                    }
                    syncGutterScroll();
                }
            });

            editorTextarea.addEventListener('input', function () {
                content = this.value;
                isDirty = (content !== originalContent);
                fileSizeBytes = new Blob([content]).size;
                validateXml(content);
                updateStats();
                clearResults();
                if (isValid) {
                    showResult('success', 'Valid XML', 'No errors found. Your XML is valid!');
                } else {
                    showResult('error', 'Validation Failed', `${errors.length} error(s) found in your XML`, errors);
                }
                syncGutterScroll();
            });

            editorTextarea.addEventListener('scroll', syncGutterScroll);

            actions.forEach(btn => {
                btn.addEventListener('click', function () {
                    if (this.disabled) return;
                    const action = this.dataset.action;
                    if (action) performAction(action);
                });
            });

            updateStats();
            editorSection.style.display = 'none';
            downloadBtn.disabled = true;
            resetBtn.disabled = true;
            actions.forEach(btn => btn.disabled = true);

        })();
    </script>
</body>
</html>
